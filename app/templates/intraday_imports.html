<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intraday Ingestion Hub</title>
    <link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1">DSE Scanner: Intraday Hub</span>
        <div>
            <a href="/dashboard" class="btn btn-primary btn-sm me-2">📈 Dashboard</a>
            <a href="/data_management" class="btn btn-outline-light btn-sm">Master Data</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Drop Zone Files</h2>
        <button class="btn btn-secondary shadow-sm" onclick="scanFolder()">
            🔄 Refresh Folder
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="px-4">Detected Date</th>
                        <th>Filename</th>
                        <th>Size</th>
                        <th class="text-end px-4">Action</th>
                    </tr>
                </thead>
                <tbody id="file-list">
                    <tr><td colspan="4" class="text-center py-4 text-muted">Scanning drop zone...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function scanFolder() {
        const tbody = document.getElementById('file-list');
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">Scanning folder...</td></tr>';
        
        try {
            const response = await fetch('/api/scan_intraday');
            const data = await response.json();
            
            if (data.files.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No CSV files found in imports/intraday/</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            data.files.forEach(file => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 align-middle fw-bold text-primary">${file.date}</td>
                    <td class="align-middle text-muted">${file.filename}</td>
                    <td class="align-middle">${file.size_kb} KB</td>
                    <td class="text-end px-4">
                        <button class="btn btn-sm btn-success shadow-sm" onclick="processFile('${file.filename}', this)">
                            ⚡ Load Data
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error(error);
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-danger">Error scanning folder. Check console.</td></tr>';
        }
    }

    async function processFile(filename, btnElement) {
        // Change button to loading state
        const originalText = btnElement.innerHTML;
        btnElement.innerHTML = '⏳ Loading...';
        btnElement.disabled = true;
        btnElement.classList.replace('btn-success', 'btn-warning');

        try {
            const response = await fetch('/api/process_intraday', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: filename })
            });
            const result = await response.json();

            if (result.success) {
                btnElement.innerHTML = '✅ Injected';
                btnElement.classList.replace('btn-warning', 'btn-outline-success');
            } else {
                alert("Error: " + result.message);
                btnElement.innerHTML = '❌ Failed';
                btnElement.classList.replace('btn-warning', 'btn-danger');
            }
        } catch (error) {
            alert("Network error processing file.");
            btnElement.innerHTML = '❌ Error';
            btnElement.classList.replace('btn-warning', 'btn-danger');
        }
    }

    // Scan the folder as soon as the page loads
    window.onload = scanFolder;
</script>
</body>
</html>
